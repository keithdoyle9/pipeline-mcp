name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Test
        run: go test ./... -count=1

      - name: Build
        run: go build -o bin/pipeline-mcp ./cmd/pipeline-mcp

      - name: Install GoReleaser
        run: GOBIN="$(pwd)/bin" go install github.com/goreleaser/goreleaser/v2@v2.14.1

      - name: Publish release artifacts
        run: ./bin/goreleaser release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
